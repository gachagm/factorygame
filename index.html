<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Factory Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏭 Factory Game</h1>

<div id="login">
  <input id="name" placeholder="Enter name">
  <button onclick="login()">Login</button>
</div>

<div id="player"></div>

<div id="actions">
  <button onclick="openChest()">🎁 Chest</button>
  <button onclick="activateBoost()">⚡ Boost x2</button>
  <button onclick="prestige()">💀 Prestige</button>
</div>

<h2>🛒 Shop</h2>
<div id="shop"></div>

<div id="resources"></div>
<div id="machines"></div>

<script src="game.js"></script>
</body>
</html>
